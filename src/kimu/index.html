<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kimu</title>
<link rel="icon" type="image/svg+xml" href="/static/logo.svg">
<script src="/static/vendor/marked.min.js"></script>
<link rel="stylesheet" href="/static/fonts/fonts.css">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div id="logo">Kimu</div>
    <nav id="tree"></nav>
  </aside>
  <div id="resizer" title="Drag to resize"></div>

  <div id="main">
    <div id="toolbar">
      <button id="menu-btn" title="Toggle sidebar">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <button id="folder-btn" title="Change folder">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
      </button>
      <span id="crumb"></span>
      <span id="saved">Saved ✓</span>
      <button id="reload-btn" title="Reload document" disabled>
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button id="search-btn" title="Search (/)">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button id="font-btn" title="Reading settings">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
      </button>
      <button id="theme-btn" title="Theme"></button>
      <button id="quit-btn" title="Quit Kimu (stops the server)">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/></svg>
      </button>
      <div id="font-panel" class="popover" hidden>
        <label>Font
          <select id="font-family">
            <option value="'Inter', system-ui, -apple-system, sans-serif">Sans</option>
            <option value="Georgia, 'Times New Roman', serif">Serif</option>
            <option value="'Fira Code', ui-monospace, monospace">Mono</option>
          </select>
        </label>
        <label>Size <input id="font-size" type="range" min="13" max="20" step="1"></label>
        <label>Width <input id="doc-width" type="range" min="40" max="95" step="1"></label>
      </div>
      <div id="theme-panel" class="popover" hidden>
        <button class="theme-opt" data-theme="light"><span class="theme-swatch" style="background:linear-gradient(135deg,#ffffff 50%,#6366f1 50%)"></span>Light</button>
        <button class="theme-opt" data-theme="dark"><span class="theme-swatch" style="background:linear-gradient(135deg,#1a1b26 50%,#818cf8 50%)"></span>Dark</button>
        <button class="theme-opt" data-theme="ayu-light"><span class="theme-swatch" style="background:linear-gradient(135deg,#fcfcfc 50%,#ff9940 50%)"></span>Ayu Light</button>
        <button class="theme-opt" data-theme="ayu-dark"><span class="theme-swatch" style="background:linear-gradient(135deg,#0d1017 50%,#ffb454 50%)"></span>Ayu Dark</button>
        <button class="theme-opt" data-theme="alucard"><span class="theme-swatch" style="background:linear-gradient(135deg,#fffbeb 50%,#644ac9 50%)"></span>Alucard (Dracula Light)</button>
        <button class="theme-opt" data-theme="dracula"><span class="theme-swatch" style="background:linear-gradient(135deg,#282a36 50%,#bd93f9 50%)"></span>Dracula</button>
        <button class="theme-opt" data-theme="synthwave"><span class="theme-swatch" style="background:linear-gradient(135deg,#262335 50%,#ff7edb 50%)"></span>Synthwave</button>
      </div>
    </div>
    <div id="tabs" hidden></div>
    <div id="scroll">
      <article id="doc"></article>
    </div>
  </div>
</div>

<div id="landing" hidden>
  <div class="landing-card">
    <img src="/static/logo.svg" alt="Kimu" width="96" height="96">
    <h1>Kimu</h1>
    <p>Open a folder of Markdown docs to get started.</p>
    <button id="landing-open" class="btn-primary">Select folder…</button>
    <p id="landing-err" class="landing-err" hidden></p>
    <button id="landing-quit" class="btn-quit">Quit Kimu</button>
  </div>
</div>

<div id="stopped" hidden>
  <div class="landing-card">
    <img src="/static/logo.svg" alt="Kimu" width="96" height="96">
    <h1>Kimu stopped</h1>
    <p>The server has shut down. You can close this window.</p>
  </div>
</div>

<div id="confirm-quit" class="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-quit-title">
    <h2 id="confirm-quit-title">Stop Kimu?</h2>
    <p>This shuts down the server. Any open Kimu tabs will stop working.</p>
    <div class="modal-actions">
      <button id="quit-cancel" class="btn-ghost">Cancel</button>
      <button id="quit-confirm" class="btn-danger">Quit</button>
    </div>
  </div>
</div>

<div id="search-overlay" hidden>
  <div id="search-box">
    <input id="search-input" type="text" placeholder="Search docs…  (Esc to close)" autocomplete="off" spellcheck="false">
    <div id="search-results"></div>
  </div>
</div>

<script type="module" src="/static/js/main.js"></script>
</body>
</html>
